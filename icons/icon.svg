<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="dotGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#9aaaff"/>
      <stop offset="100%" stop-color="#6C7FFF"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#161618"/>
  <!-- Outer subtle ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#6C7FFF" stroke-opacity="0.12" stroke-width="1.5"/>
  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="#6C7FFF" stroke-opacity="0.18" stroke-width="1"/>
  <!-- Glow halo -->
  <circle cx="256" cy="256" r="64" fill="#6C7FFF" fill-opacity="0.22" filter="url(#glow)"/>
  <!-- Main dot -->
  <circle cx="256" cy="256" r="54" fill="url(#dotGrad)"/>
</svg>
