<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe's AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e2027;
  --surface: #252830;
  --surface2: #2d3039;
  --surface3: #333744;
  --border: #383d4a;
  --border2: #444a58;
  --accent: #5b8af0;
  --accent-light: rgba(91,138,240,0.12);
  --text: #e4e6ef;
  --text2: #9096a8;
  --text3: #565d70;
  --user-bubble: #2e4080;
  --ai-bubble: #2d3039;
  --shadow: 0 2px 12px rgba(0,0,0,0.25);
  --success: #4caf7d;
  --danger: #e05c5c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* SIDEBAR */
.sidebar {
  width: 248px;
  min-width: 248px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.02em;
}

.app-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

.new-btn {
  width: 100%;
  padding: 8px 12px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid rgba(91,138,240,0.25);
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

.new-btn:hover { background: rgba(91,138,240,0.2); border-color: rgba(91,138,240,0.4); }

.projects-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.projects-list::-webkit-scrollbar { width: 3px; }
.projects-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 8px 4px;
}

.project-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 1px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.project-item:hover { background: var(--surface2); }
.project-item.active { background: var(--surface3); }

.project-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
.project-emoji { font-size: 15px; flex-shrink: 0; }
.project-text { min-width: 0; }

.project-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-item.active .project-name { color: var(--accent); }

.project-desc {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.project-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
.project-item:hover .project-actions { opacity: 1; }

.icon-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 3px 4px;
  border-radius: 4px;
  font-size: 11px;
  transition: all 0.12s;
}

.icon-btn:hover { background: var(--border); color: var(--text2); }
.icon-btn.danger:hover { color: var(--danger); }

.sidebar-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
}

/* TOPBAR */
.topbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
}

.current-project { display: flex; align-items: center; gap: 10px; }
.current-emoji { font-size: 18px; }
.current-name { font-size: 14px; font-weight: 600; color: var(--text); }
.topbar-actions { display: flex; gap: 6px; }

.topbar-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.12s;
}

.topbar-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.topbar-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.topbar-btn.primary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* CHAT */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  padding: 40px;
}

.empty-icon { font-size: 36px; opacity: 0.5; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text2); }
.empty-desc { font-size: 12px; line-height: 1.6; color: var(--text3); max-width: 260px; }

.message {
  display: flex;
  gap: 10px;
  animation: msgIn 0.2s ease;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  font-weight: 700;
}

.message.user .avatar { background: var(--accent); color: white; }
.message.ai .avatar { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); font-size: 13px; }

.bubble {
  max-width: 72%;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bubble);
  color: #d4e0ff;
  border: 1px solid rgba(91,138,240,0.2);
  border-radius: 10px 3px 10px 10px;
}

.message.ai .bubble {
  background: var(--ai-bubble);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px 10px 10px 10px;
}

.bubble-actions { display: flex; gap: 4px; margin-top: 5px; opacity: 0; transition: opacity 0.12s; }
.message:hover .bubble-actions { opacity: 1; }

.bubble-action-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 10px;
  cursor: pointer;
  padding: 2px 7px;
  border-radius: 4px;
  transition: all 0.12s;
  font-family: 'DM Mono', monospace;
}

.bubble-action-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--surface2); }

.thinking { display: flex; gap: 4px; padding: 2px 0; align-items: center; }
.thinking span {
  width: 5px; height: 5px;
  background: var(--text3);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.3; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* INPUT */
.input-area {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-inner { max-width: 780px; margin: 0 auto; }

.input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  transition: border-color 0.15s;
}

.input-wrap:focus-within { border-color: var(--accent); }

.chat-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  max-height: 130px;
  min-height: 22px;
}

.chat-input::placeholder { color: var(--text3); }

.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  font-size: 13px;
}

.send-btn:hover { background: #4a79e0; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.input-hint { text-align: center; font-size: 10px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; }

/* NO PROJECT */
.no-project {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px;
  text-align: center;
}

.no-project-icon { font-size: 44px; opacity: 0.4; }
.no-project h2 { font-size: 17px; font-weight: 600; color: var(--text); }
.no-project p { font-size: 13px; line-height: 1.7; color: var(--text2); max-width: 280px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(3px);
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 22px;
  width: 460px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

.form-group { margin-bottom: 13px; }

.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.04em; }

.form-input, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.btn { padding: 8px 16px; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #4a79e0; }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

.emoji-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }

.emoji-opt {
  width: 30px; height: 30px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}

.emoji-opt:hover { border-color: var(--accent); background: var(--accent-light); }
.emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="app-title">
      <div class="app-dot"></div>
      Zoe's AI Assistant
    </div>
    <button class="new-btn" onclick="openNewProjectModal()">＋ 新しいプロジェクト</button>
  </div>
  <div class="projects-list" id="projectsList"></div>
  <div class="sidebar-footer">
    <div class="status-dot"></div>
    Claude Sonnet 4.6
  </div>
</div>

<div class="main" id="mainArea">
  <div class="no-project">
    <div class="no-project-icon">✦</div>
    <h2>Zoe's AI Assistant</h2>
    <p>左のサイドバーから「汎用チャット」を選ぶか、新しいプロジェクトを作成してください。</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">新しいプロジェクト</div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-row" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">プロジェクト名 *</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：メール作成、履歴書改善..." maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">説明（任意）</label>
      <input type="text" class="form-input" id="projectDesc" placeholder="例：候補者・企業へのメール作成" maxlength="50">
    </div>
    <div class="form-group">
      <label class="form-label">システムPrompt *</label>
      <textarea class="form-textarea" id="projectPrompt" placeholder="AIへの指示を書いてください。

例：あなたは日本の人材紹介会社の採用コンサルタントです。候補者と企業へのメールを丁寧かつ自然なビジネス日本語で作成してください。"></textarea>
      <div class="form-hint">具体的に書くほど精度が上がります。</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveProject()">作成</button>
    </div>
  </div>
</div>

<script>
const GENERAL_ID = '__general__';
const EMOJIS = ['💬','📧','📄','📋','🔍','✍️','📊','🤝','💼','🎯','⚡','🌐','📝','🗂️','💡','🧠','🗣️','📨'];

let projects = JSON.parse(localStorage.getItem('aiProjects_v2') || '[]');
let currentProjectId = null;
let editingProjectId = null;
let selectedEmoji = '💬';
let isLoading = false;

renderSidebar();

function saveProjects() { localStorage.setItem('aiProjects_v2', JSON.stringify(projects)); }

function renderSidebar() {
  const list = document.getElementById('projectsList');
  let html = `<div class="section-label">チャット</div>
    <div class="project-item ${currentProjectId===GENERAL_ID?'active':''}" onclick="selectProject('${GENERAL_ID}')">
      <div class="project-info">
        <div class="project-emoji">💬</div>
        <div class="project-text">
          <div class="project-name">汎用チャット</div>
          <div class="project-desc">何でも聞いてください</div>
        </div>
      </div>
    </div>`;

  if (projects.length > 0) {
    html += `<div class="section-label" style="margin-top:8px">プロジェクト</div>`;
    html += projects.map(p => `
      <div class="project-item ${currentProjectId===p.id?'active':''}" onclick="selectProject('${p.id}')">
        <div class="project-info">
          <div class="project-emoji">${p.emoji}</div>
          <div class="project-text">
            <div class="project-name">${p.name}</div>
            ${p.desc?`<div class="project-desc">${p.desc}</div>`:''}
          </div>
        </div>
        <div class="project-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${p.id}')">✏️</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();deleteProject('${p.id}')">🗑</button>
        </div>
      </div>`).join('');
  }
  list.innerHTML = html;
}

function selectProject(id) { currentProjectId = id; renderSidebar(); renderChatArea(); }

function deleteProject(id) {
  if (!confirm('削除しますか？')) return;
  projects = projects.filter(p => p.id !== id);
  localStorage.removeItem(`chat_${id}`);
  if (currentProjectId === id) currentProjectId = null;
  saveProjects(); renderSidebar();
  currentProjectId ? renderChatArea() : renderNoProject();
}

function initEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent === e));
}

function openNewProjectModal() {
  editingProjectId = null; selectedEmoji = '💬';
  document.getElementById('modalTitle').textContent = '新しいプロジェクト';
  document.getElementById('modalSaveBtn').textContent = '作成';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectPrompt').value = '';
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 100);
}

function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editingProjectId = id; selectedEmoji = p.emoji;
  document.getElementById('modalTitle').textContent = 'プロジェクトを編集';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('projectName').value = p.name;
  document.getElementById('projectDesc').value = p.desc || '';
  document.getElementById('projectPrompt').value = p.prompt;
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) hideModal(); }

function saveProject() {
  const name = document.getElementById('projectName').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  const prompt = document.getElementById('projectPrompt').value.trim();
  if (!name) { alert('プロジェクト名を入力してください'); return; }
  if (!prompt) { alert('Promptを入力してください'); return; }

  if (editingProjectId) {
    const idx = projects.findIndex(p => p.id === editingProjectId);
    if (idx !== -1) projects[idx] = { ...projects[idx], name, desc, prompt, emoji: selectedEmoji };
  } else {
    const newP = { id: Date.now().toString(), name, desc, prompt, emoji: selectedEmoji };
    projects.push(newP);
    currentProjectId = newP.id;
  }
  saveProjects(); renderSidebar(); renderChatArea(); hideModal();
}

function getMessages() { return JSON.parse(localStorage.getItem(`chat_${currentProjectId}`) || '[]'); }
function saveMessages(msgs) { localStorage.setItem(`chat_${currentProjectId}`, JSON.stringify(msgs)); }

function renderNoProject() {
  document.getElementById('mainArea').innerHTML = `
    <div class="no-project">
      <div class="no-project-icon">✦</div>
      <h2>Zoe's AI Assistant</h2>
      <p>左のサイドバーから「汎用チャット」を選ぶか、新しいプロジェクトを作成してください。</p>
    </div>`;
}

function renderChatArea() {
  if (!currentProjectId) { renderNoProject(); return; }
  const isGeneral = currentProjectId === GENERAL_ID;
  const p = isGeneral ? { name:'汎用チャット', emoji:'💬', prompt:'', id:GENERAL_ID } : projects.find(x => x.id === currentProjectId);
  if (!p) { renderNoProject(); return; }

  document.getElementById('mainArea').innerHTML = `
    <div class="topbar">
      <div class="current-project">
        <div class="current-emoji">${p.emoji}</div>
        <div class="current-name">${p.name}</div>
      </div>
      <div class="topbar-actions">
        ${!isGeneral ? `<button class="topbar-btn primary" onclick="openEditModal('${p.id}')">⚙ Prompt編集</button>` : ''}
        <button class="topbar-btn danger" onclick="clearChat()">🗑 クリア</button>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力... (Shift+Enter で送信)"
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">Shift+Enter で送信 · Enter で改行</div>
      </div>
    </div>`;

  renderMessages();
  document.getElementById('chatInput')?.focus();
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!chatArea) return;
  const msgs = getMessages();
  if (!msgs.length) {
    const isGeneral = currentProjectId === GENERAL_ID;
    const p = isGeneral ? { emoji:'💬', name:'汎用チャット', desc:'何でも聞いてください' } : projects.find(x => x.id === currentProjectId);
    chatArea.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${p?.emoji}</div>
      <div class="empty-title">${p?.name}</div>
      <div class="empty-desc">${p?.desc || 'メッセージを入力して会話を始めましょう'}</div>
    </div>`;
    return;
  }
  chatArea.innerHTML = msgs.map((m, i) => `
    <div class="message ${m.role}">
      <div class="avatar">${m.role==='user'?'Z':'✦'}</div>
      <div>
        <div class="bubble">${escapeHtml(m.content)}</div>
        <div class="bubble-actions">
          <button class="bubble-action-btn" onclick="copyMsg(${i})">コピー</button>
          ${m.role==='ai'?`<button class="bubble-action-btn" onclick="regenMsg(${i})">再生成</button>`:''}
        </div>
      </div>
    </div>`).join('');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clearChat() { if (!confirm('クリアしますか？')) return; localStorage.removeItem(`chat_${currentProjectId}`); renderMessages(); }
function copyMsg(i) { navigator.clipboard.writeText(getMessages()[i]?.content || ''); }
async function regenMsg(i) { const msgs = getMessages().slice(0,i); saveMessages(msgs); renderMessages(); await callAPI(msgs); }
function handleKey(e) { if (e.key==='Enter' && e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }

async function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || isLoading) return;
  const msgs = getMessages();
  msgs.push({ role:'user', content:text });
  saveMessages(msgs);
  input.value = ''; input.style.height = 'auto';
  renderMessages();
  await callAPI(msgs);
}

async function callAPI(msgs) {
  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = true;
  const chatArea = document.getElementById('chatArea');
  if (chatArea) {
    const t = document.createElement('div');
    t.className = 'message ai'; t.id = 'thinkingMsg';
    t.innerHTML = `<div class="avatar">✦</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(t);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  try {
    const isGeneral = currentProjectId === GENERAL_ID;
    const p = isGeneral ? null : projects.find(x => x.id === currentProjectId);
    const systemPrompt = p?.prompt || 'あなたは優秀なAIアシスタントです。丁寧に回答してください。';
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ systemPrompt, messages: msgs.map(m => ({ role: m.role==='ai'?'assistant':'user', content: m.content })) })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'エラーが発生しました');
    const allMsgs = getMessages();
    allMsgs.push({ role:'ai', content:data.content });
    saveMessages(allMsgs);
  } catch(e) {
    const allMsgs = getMessages();
    allMsgs.push({ role:'ai', content:'⚠ エラー: '+e.message });
    saveMessages(allMsgs);
  } finally {
    document.getElementById('thinkingMsg')?.remove();
    isLoading = false;
    if (sendBtn) sendBtn.disabled = false;
    renderMessages();
    document.getElementById('chatInput')?.focus();
  }
}
</script>
</body>
</html>
