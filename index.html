<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe's AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<style>
:root {
  --bg: #13151c;
  --surface: #1a1d26;
  --surface2: #20232d;
  --surface3: #272b38;
  --surface4: #2e3240;
  --border: #2a2e3d;
  --border2: #353a4d;
  --accent: #5b8af0;
  --accent2: #4a79e0;
  --accent-light: rgba(91,138,240,0.1);
  --accent-glow: rgba(91,138,240,0.15);
  --text: #dde0f0;
  --text2: #8890a8;
  --text3: #4a5068;
  --user-bubble: #243060;
  --ai-bubble: #20232d;
  --success: #3eb87a;
  --danger: #d95555;
  --memo: #2a2518;
  --memo-border: #4a3e20;
  --memo-text: #c8a84a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  z-index: 100;
  transition: transform 0.25s ease;
}

.sidebar-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 12px;
}

.logo-mark {
  width: 26px;
  height: 26px;
  background: var(--accent-light);
  border: 1px solid rgba(91,138,240,0.3);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(91,138,240,0.5);
}

.app-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
}

.new-btn {
  width: 100%;
  padding: 8px 10px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid rgba(91,138,240,0.2);
  border-radius: 7px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
}
.new-btn:hover { background: rgba(91,138,240,0.18); border-color: rgba(91,138,240,0.35); }

.projects-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px;
  -webkit-overflow-scrolling: touch;
}
.projects-list::-webkit-scrollbar { width: 2px; }
.projects-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 8px 8px 4px;
  font-family: 'DM Mono', monospace;
}

.project-item {
  padding: 7px 9px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 1px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.project-item:hover { background: var(--surface2); }
.project-item.active { background: var(--surface3); }

.project-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
.project-emoji { font-size: 14px; flex-shrink: 0; }
.project-text { min-width: 0; }

.project-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-item.active .project-name { color: var(--accent); }

.project-desc {
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.project-actions { display: flex; gap: 1px; flex-shrink: 0; opacity: 0; transition: opacity 0.12s; }
.project-item:hover .project-actions,
.project-item.active .project-actions { opacity: 1; }

.icon-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 3px 5px; border-radius: 4px;
  font-size: 11px; transition: all 0.12s;
}
.icon-btn:hover { background: var(--border); color: var(--text2); }
.icon-btn.danger:hover { color: var(--danger); }

.sidebar-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot { width: 5px; height: 5px; background: var(--success); border-radius: 50%; box-shadow: 0 0 4px rgba(62,184,122,0.5); }

/* ── OVERLAY ── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
.sidebar-overlay.open { display: block; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  min-width: 0;
}

/* ── TOPBAR ── */
.topbar {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
  gap: 10px;
}

.topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

.menu-btn {
  background: none; border: none; color: var(--text2);
  font-size: 17px; cursor: pointer; padding: 2px 6px;
  border-radius: 5px; flex-shrink: 0; display: none;
}
.menu-btn:hover { background: var(--surface2); }

.topbar-badge {
  width: 28px; height: 28px;
  background: var(--accent-light);
  border: 1px solid rgba(91,138,240,0.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}

.current-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-actions { display: flex; gap: 5px; flex-shrink: 0; }

.topbar-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.topbar-btn:hover { color: var(--text); background: var(--surface2); }
.topbar-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.topbar-btn.primary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── CHAT ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { width: 2px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  padding: 40px 20px;
}
.empty-icon {
  width: 48px; height: 48px;
  background: var(--accent-light);
  border: 1px solid rgba(91,138,240,0.2);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 4px;
}
.empty-title { font-size: 14px; font-weight: 600; color: var(--text2); }
.empty-desc { font-size: 12px; line-height: 1.7; color: var(--text3); max-width: 220px; }

.message {
  display: flex;
  gap: 9px;
  animation: msgIn 0.18s ease;
  max-width: 740px;
  width: 100%;
  margin: 0 auto;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}
.message.user .avatar {
  background: var(--accent);
  color: white;
  font-size: 10px;
}
.message.ai .avatar {
  background: var(--surface3);
  color: var(--accent);
  border: 1px solid var(--border2);
  font-size: 13px;
}

.bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
.message.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.8;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bubble);
  color: #c0d0f8;
  border: 1px solid rgba(91,138,240,0.15);
  border-radius: 10px 3px 10px 10px;
  white-space: pre-wrap;
}

.message.ai .bubble {
  background: var(--ai-bubble);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px 10px 10px 10px;
}

/* Markdown */
.message.ai .bubble h1, .message.ai .bubble h2, .message.ai .bubble h3 {
  font-size: 13px; font-weight: 700; margin: 10px 0 4px; color: var(--text);
}
.message.ai .bubble p { margin: 4px 0; }
.message.ai .bubble ul, .message.ai .bubble ol { padding-left: 18px; margin: 4px 0; }
.message.ai .bubble li { margin: 3px 0; }
.message.ai .bubble strong { color: #b8ccff; font-weight: 700; }
.message.ai .bubble code {
  background: var(--surface3); padding: 1px 5px;
  border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px;
}
.message.ai .bubble pre {
  background: var(--surface3); padding: 10px; border-radius: 6px;
  overflow-x: auto; margin: 6px 0;
}
.message.ai .bubble pre code { background: none; padding: 0; }
.message.ai .bubble hr { border: none; border-top: 1px solid var(--border2); margin: 8px 0; }
.message.ai .bubble table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
.message.ai .bubble th, .message.ai .bubble td {
  border: 1px solid var(--border2); padding: 5px 8px; text-align: left;
}
.message.ai .bubble th { background: var(--surface3); font-weight: 600; }
.message.ai .bubble blockquote {
  border-left: 2px solid var(--accent); padding-left: 10px; color: var(--text2); margin: 4px 0;
}

/* 確認メモ */
.memo-box {
  margin-top: 8px;
  background: var(--memo);
  border: 1px solid var(--memo-border);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.7;
}
.memo-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--memo-text);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
  font-family: 'DM Mono', monospace;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* コピーボタン */
.bubble-actions { display: flex; gap: 4px; margin-top: 6px; padding: 0 1px; }

.bubble-action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 10px;
  cursor: pointer;
  padding: 3px 10px;
  border-radius: 5px;
  transition: all 0.12s;
  font-family: 'DM Mono', monospace;
}
.bubble-action-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--surface3); }
.bubble-action-btn.copied { border-color: var(--success); color: var(--success); background: rgba(62,184,122,0.08); }

.thinking { display: flex; gap: 4px; align-items: center; }
.thinking span {
  width: 5px; height: 5px; background: var(--text3);
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.3; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ── INPUT ── */
.input-area {
  padding: 10px 18px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.input-inner { max-width: 740px; margin: 0 auto; }

.pdf-preview {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 6px 10px; margin-bottom: 6px;
  font-size: 12px; color: var(--text2);
}
.pdf-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pdf-remove-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0;
}
.pdf-remove-btn:hover { color: var(--danger); }

.input-wrap {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 9px; padding: 8px 10px;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: rgba(91,138,240,0.5); }

.pdf-btn {
  background: none; border: none; color: var(--text3);
  font-size: 15px; cursor: pointer; padding: 2px 4px;
  border-radius: 4px; transition: all 0.12s; flex-shrink: 0; line-height: 1;
}
.pdf-btn:hover { color: var(--accent); background: var(--accent-light); }
.pdf-btn.active { color: var(--accent); }

.chat-input {
  flex: 1; background: none; border: none; color: var(--text);
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  line-height: 1.6; resize: none; outline: none;
  max-height: 120px; min-height: 20px;
}
.chat-input::placeholder { color: var(--text3); }

.send-btn {
  background: var(--accent); border: none; color: white;
  width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; font-size: 12px;
}
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

.input-hint { text-align: center; font-size: 9px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; letter-spacing: 0.03em; }

/* ── MODEL SELECTOR ── */
.model-selector { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
.model-btn {
  padding: 3px 11px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text3);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.12s;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.model-btn:hover { border-color: var(--border2); color: var(--text2); }
.model-btn.active { background: var(--accent-light); border-color: rgba(91,138,240,0.4); color: var(--accent); }
.img-thumb { width: 28px; height: 28px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }

#pdfFileInput, #imageFileInput { display: none; }

/* ── NO PROJECT ── */
.no-project {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 40px 20px; text-align: center;
}
.no-project-icon {
  width: 56px; height: 56px;
  background: var(--accent-light); border: 1px solid rgba(91,138,240,0.2);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.no-project h2 { font-size: 16px; font-weight: 600; color: var(--text); }
.no-project p { font-size: 12px; line-height: 1.7; color: var(--text2); max-width: 240px; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; flex-direction: column; gap: 14px;
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px); padding: 16px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 22px; width: 100%; max-width: 440px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; letter-spacing: 0.03em; }
.form-input, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  padding: 7px 10px; border-radius: 7px; outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus { border-color: rgba(91,138,240,0.5); }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-hint { font-size: 10px; color: var(--text3); margin-top: 3px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 7px 16px; border-radius: 7px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.emoji-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
.emoji-opt {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.emoji-opt:hover { border-color: rgba(91,138,240,0.4); background: var(--accent-light); }
.emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  /* サイドバーをオーバーレイ式に */
  .sidebar {
    position: fixed; top: 0; left: 0;
    height: 100vh; height: 100dvh;
    transform: translateX(-100%);
    box-shadow: 6px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform: translateX(0); }

  /* ☰ ボタンを常に表示 */
  .menu-btn { display: flex !important; }

  /* フォントサイズ */
  body { font-size: 16px; }
  .bubble { font-size: 15px; line-height: 1.8; }
  .chat-input { font-size: 16px; }
  .project-name { font-size: 14px; }
  .project-desc, .section-label { font-size: 11px; }
  .current-name { font-size: 15px; }
  .topbar-btn { font-size: 13px; }
  .bubble-action-btn { font-size: 12px; padding: 5px 12px; }

  /* バブル幅 */
  .bubble-wrap { max-width: 92%; }

  /* モデル選択：横スクロール（折り返さない） */
  .model-selector {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  .model-selector::-webkit-scrollbar { display: none; }
  .model-btn { flex-shrink: 0; padding: 5px 14px; font-size: 11px; }

  /* その他 */
  .input-hint { display: none; }
  .topbar-btn span { display: none; }

  /* キーボード表示時のレイアウト崩れ防止 */
  .chat-area { padding: 12px 12px; min-height: 0; }
  .input-area { padding: 6px 12px 10px; }

  /* キーボード表示中（input focus時）はモデル選択バーを隠してスペース確保 */
  .input-area:focus-within .model-selector { display: none; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">loading...</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="app-logo">
      <div class="logo-mark"><div class="logo-dot"></div></div>
      <span class="app-title">Zoe's AI Assistant</span>
    </div>
    <button class="new-btn" onclick="openNewProjectModal()">＋ 新しいプロジェクト</button>
  </div>
  <div class="projects-list" id="projectsList"></div>
  <div class="sidebar-footer">
    <div class="status-dot"></div>
    <span id="footerModel">Claude Sonnet 4</span>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="app-logo" style="margin:0">
        <div class="logo-mark"><div class="logo-dot"></div></div>
        <span class="app-title">Zoe's AI Assistant</span>
      </div>
    </div>
  </div>
  <div class="no-project">
    <div class="no-project-icon">✦</div>
    <h2>Zoe's AI Assistant</h2>
    <p>左のサイドバーからプロジェクトを選んでください。</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">新しいプロジェクト</div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-row" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">プロジェクト名 *</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：メール作成、履歴書改善..." maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">説明（任意）</label>
      <input type="text" class="form-input" id="projectDesc" placeholder="例：候補者・企業へのメール作成" maxlength="50">
    </div>
    <div class="form-group">
      <label class="form-label">システムPrompt *</label>
      <textarea class="form-textarea" id="projectPrompt" placeholder="AIへの指示を書いてください。"></textarea>
      <div class="form-hint">具体的に書くほど精度が上がります。</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveProject()">作成</button>
    </div>
  </div>
</div>

<input type="file" id="pdfFileInput" accept=".pdf" onchange="handlePdfSelect(event)">
<input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/gif,image/webp" onchange="handleImageSelect(event)">

<script>
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

const GENERAL_ID = '__general__';
const EMOJIS = ['💬','📧','📄','📋','🔍','✍️','📊','🤝','💼','🎯','⚡','🌐','📝','🗂️','💡','🧠','🗣️','📨'];
const MEMO_MARKERS = ['【確認メモ】', '[確認メモ]', '【Confirmation Notes】'];
const MODELS = [
  { id: 'claude-sonnet-4',   label: 'Claude Sonnet 4.6' },
  { id: 'gpt-4o',            label: 'GPT-4o' },
  { id: 'gemini-2.5-flash',  label: 'Gemini 2.5 Flash' },
];

let projects = [], currentProjectId = null, editingProjectId = null;
let selectedEmoji = '💬', isLoading = false, pendingPdf = null, pendingImage = null;
let currentModel = 'claude-sonnet-4';

async function init() {
  currentModel = localStorage.getItem('selectedModel') || 'claude-sonnet-4';
  const footer = document.getElementById('footerModel');
  if (footer) footer.textContent = MODELS.find(m => m.id === currentModel)?.label || 'Claude Sonnet 4';
  await loadProjects();
  document.getElementById('loadingOverlay').style.display = 'none';
  renderSidebar();
}

async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    if (res.ok) projects = await res.json();
  } catch(e) { projects = []; }
}

async function createProject(data) {
  const res = await fetch('/api/projects', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.ok ? await res.json() : null;
}

async function updateProject(id, data) {
  await fetch(`/api/projects?id=${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

async function deleteProjectAPI(id) {
  await fetch(`/api/projects?id=${id}`, { method: 'DELETE' });
}

function renderSidebar() {
  const list = document.getElementById('projectsList');
  const generalConvs = getGeneralConversations();
  let html = `
    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:6px">
      <span>General</span>
      <button class="icon-btn" onclick="createGeneralConversation()" title="新しい会話" style="font-size:13px">＋</button>
    </div>
    ${generalConvs.map(conv => `
    <div class="project-item ${currentProjectId===conv.id?'active':''}" onclick="selectProject('${conv.id}')">
      <div class="project-info">
        <div class="project-emoji">💬</div>
        <div class="project-text">
          <div class="project-name">${escapeHtml(conv.name)}</div>
        </div>
      </div>
      <div class="project-actions">
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteGeneralConversation('${conv.id}')">🗑</button>
      </div>
    </div>`).join('')}`;

  if (projects.length > 0) {
    html += `<div class="section-label" style="margin-top:8px">Projects</div>`;
    html += projects.map(p => `
      <div class="project-item ${currentProjectId===p.id?'active':''}" onclick="selectProject('${p.id}')">
        <div class="project-info">
          <div class="project-emoji">${p.emoji||'💬'}</div>
          <div class="project-text">
            <div class="project-name">${escapeHtml(p.name)}</div>
            ${p.description?`<div class="project-desc">${escapeHtml(p.description)}</div>`:''}
          </div>
        </div>
        <div class="project-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${p.id}')">✏️</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();confirmDelete('${p.id}')">🗑</button>
        </div>
      </div>`).join('');
  }
  list.innerHTML = html;
}

function selectProject(id) {
  currentProjectId = id; pendingPdf = null;
  renderSidebar(); renderChatArea(); closeSidebar();
}

async function confirmDelete(id) {
  if (!confirm('このプロジェクトを削除しますか？')) return;
  await deleteProjectAPI(id);
  projects = projects.filter(p => p.id !== id);
  localStorage.removeItem(`chat_${id}`);
  if (currentProjectId === id) { currentProjectId = null; renderNoProject(); }
  renderSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function selectModel(id) {
  currentModel = id;
  localStorage.setItem('selectedModel', id);
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.model === id);
  });
  const footer = document.getElementById('footerModel');
  if (footer) footer.textContent = MODELS.find(m => m.id === id)?.label || id;
}

// ── 汎用チャット複数会話 ──────────────────────────────────────────────
function isGeneralChat(id) {
  return id === GENERAL_ID || (id && id.startsWith('__gen_'));
}

function getGeneralConversations() {
  try {
    const saved = localStorage.getItem('general_conversations');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [{ id: GENERAL_ID, name: '会話1' }];
}

function saveGeneralConversations(convs) {
  localStorage.setItem('general_conversations', JSON.stringify(convs));
}

function createGeneralConversation() {
  const convs = getGeneralConversations();
  const newId = `__gen_${Date.now()}__`;
  convs.push({ id: newId, name: `会話${convs.length + 1}` });
  saveGeneralConversations(convs);
  currentProjectId = newId;
  renderSidebar(); renderChatArea(); closeSidebar();
}

function deleteGeneralConversation(id) {
  if (!confirm('この会話を削除しますか？')) return;
  let convs = getGeneralConversations().filter(c => c.id !== id);
  if (convs.length === 0) convs = [{ id: GENERAL_ID, name: '会話1' }];
  saveGeneralConversations(convs);
  localStorage.removeItem(`chat_${id}`);
  if (currentProjectId === id) { currentProjectId = convs[0].id; renderChatArea(); }
  renderSidebar();
}

function initEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
}
function selectEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent === e));
}

function openNewProjectModal() {
  editingProjectId = null; selectedEmoji = '💬';
  document.getElementById('modalTitle').textContent = '新しいプロジェクト';
  document.getElementById('modalSaveBtn').textContent = '作成';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectPrompt').value = '';
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 100);
}

function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editingProjectId = id; selectedEmoji = p.emoji || '💬';
  document.getElementById('modalTitle').textContent = 'プロジェクトを編集';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('projectName').value = p.name;
  document.getElementById('projectDesc').value = p.description || '';
  document.getElementById('projectPrompt').value = p.prompt;
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) hideModal(); }

async function saveProject() {
  const name = document.getElementById('projectName').value.trim();
  const description = document.getElementById('projectDesc').value.trim();
  const prompt = document.getElementById('projectPrompt').value.trim();
  if (!name) { alert('プロジェクト名を入力してください'); return; }
  if (!prompt) { alert('Promptを入力してください'); return; }

  const saveBtn = document.getElementById('modalSaveBtn');
  saveBtn.textContent = '保存中...'; saveBtn.disabled = true;
  try {
    if (editingProjectId) {
      await updateProject(editingProjectId, { name, description, prompt, emoji: selectedEmoji });
      const idx = projects.findIndex(p => p.id === editingProjectId);
      if (idx !== -1) projects[idx] = { ...projects[idx], name, description, prompt, emoji: selectedEmoji };
    } else {
      const newP = await createProject({ name, description, prompt, emoji: selectedEmoji });
      if (newP) { projects.push(newP); currentProjectId = newP.id; }
    }
    renderSidebar(); renderChatArea(); hideModal();
  } finally {
    saveBtn.textContent = editingProjectId ? '保存' : '作成';
    saveBtn.disabled = false;
  }
}

// ── PDF ──────────────────────────────────────────────────────────────
function triggerPdfUpload() { document.getElementById('pdfFileInput').click(); }

async function handlePdfSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 20 * 1024 * 1024) { alert('PDFは20MB以下にしてください'); return; }

  // PDF読み込み中表示
  pendingPdf = { name: file.name, text: null, loading: true };
  renderPdfPreview('読み込み中...');

  try {
    // PDF.jsでテキスト抽出
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += `\n--- ${i}ページ ---\n${pageText}`;
    }

    pendingPdf = { name: file.name, text: fullText.trim(), loading: false };
    renderPdfPreview();
  } catch(e) {
    alert('PDFの読み込みに失敗しました。テキストが含まれているPDFをお試しください。');
    pendingPdf = null;
    renderPdfPreview();
  }
  event.target.value = '';
}

function renderPdfPreview(statusText) {
  const existing = document.getElementById('pdfPreviewBar');
  if (existing) existing.remove();
  if (!pendingPdf) return;
  const inputInner = document.querySelector('.input-inner');
  const preview = document.createElement('div');
  preview.className = 'pdf-preview'; preview.id = 'pdfPreviewBar';
  const label = statusText || (pendingPdf.loading ? '読み込み中...' : `${pendingPdf.name}`);
  preview.innerHTML = `<span>📄</span><span class="pdf-preview-name">${escapeHtml(label)}</span><button class="pdf-remove-btn" onclick="removePdf()">✕</button>`;
  inputInner.insertBefore(preview, inputInner.firstChild);
  const btn = document.getElementById('pdfBtn');
  if (btn) btn.classList.add('active');
}

function removePdf() {
  pendingPdf = null;
  document.getElementById('pdfPreviewBar')?.remove();
  document.getElementById('pdfBtn')?.classList.remove('active');
}

// ── 画像 ──────────────────────────────────────────────────────────────
function triggerImageUpload() { document.getElementById('imageFileInput').click(); }

async function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const allowed = ['image/jpeg','image/png','image/gif','image/webp'];
  if (!allowed.includes(file.type)) { alert('JPG・PNG・GIF・WebP形式のみ対応しています'); return; }
  if (file.size > 10 * 1024 * 1024) { alert('画像は10MB以下にしてください'); return; }

  pendingImage = { name: file.name, base64: null, mimeType: file.type, loading: true };
  renderImagePreview('読み込み中...');

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    pendingImage = { name: file.name, base64, mimeType: file.type, loading: false };
    renderImagePreview();
  } catch(e) {
    alert('画像の読み込みに失敗しました');
    pendingImage = null;
    renderImagePreview();
  }
  event.target.value = '';
}

function renderImagePreview(statusText) {
  document.getElementById('imagePreviewBar')?.remove();
  if (!pendingImage) return;
  const inputInner = document.querySelector('.input-inner');
  const preview = document.createElement('div');
  preview.className = 'pdf-preview'; preview.id = 'imagePreviewBar';
  if (statusText || pendingImage.loading) {
    preview.innerHTML = `<span>🖼️</span><span class="pdf-preview-name">${escapeHtml(statusText || '読み込み中...')}</span><button class="pdf-remove-btn" onclick="removeImage()">✕</button>`;
  } else {
    preview.innerHTML = `<img class="img-thumb" src="data:${pendingImage.mimeType};base64,${pendingImage.base64}"><span class="pdf-preview-name">${escapeHtml(pendingImage.name)}</span><button class="pdf-remove-btn" onclick="removeImage()">✕</button>`;
  }
  const pdfBar = document.getElementById('pdfPreviewBar');
  if (pdfBar) pdfBar.after(preview);
  else inputInner.insertBefore(preview, inputInner.firstChild);
  document.getElementById('imgBtn')?.classList.add('active');
}

function removeImage() {
  pendingImage = null;
  document.getElementById('imagePreviewBar')?.remove();
  document.getElementById('imgBtn')?.classList.remove('active');
}

function handlePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (!item.type.startsWith('image/')) continue;
    const file = item.getAsFile();
    if (!file) continue;
    e.preventDefault();
    const allowed = ['image/jpeg','image/png','image/gif','image/webp'];
    if (!allowed.includes(file.type)) { alert('JPG・PNG・GIF・WebP形式のみ対応しています'); return; }
    if (file.size > 10 * 1024 * 1024) { alert('画像は10MB以下にしてください'); return; }
    pendingImage = { name: file.name || 'pasted-image.png', base64: null, mimeType: file.type, loading: true };
    renderImagePreview('読み込み中...');
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImage = { name: file.name || 'pasted-image.png', base64: ev.target.result.split(',')[1], mimeType: file.type, loading: false };
      renderImagePreview();
    };
    reader.onerror = () => { alert('画像の読み込みに失敗しました'); pendingImage = null; renderImagePreview(); };
    reader.readAsDataURL(file);
    return;
  }
}

// ── Chat ──────────────────────────────────────────────────────────────
function getMessages() { return JSON.parse(localStorage.getItem(`chat_${currentProjectId}`) || '[]'); }
function saveMessages(msgs) { localStorage.setItem(`chat_${currentProjectId}`, JSON.stringify(msgs)); }

function renderNoProject() {
  document.getElementById('mainArea').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="app-logo" style="margin:0">
          <div class="logo-mark"><div class="logo-dot"></div></div>
          <span class="app-title">Zoe's AI Assistant</span>
        </div>
      </div>
    </div>
    <div class="no-project">
      <div class="no-project-icon">✦</div>
      <h2>Zoe's AI Assistant</h2>
      <p>左のサイドバーからプロジェクトを選んでください。</p>
    </div>`;
}

function renderChatArea() {
  if (!currentProjectId) { renderNoProject(); return; }
  const isGeneral = isGeneralChat(currentProjectId);
  const p = isGeneral
    ? (() => { const c = getGeneralConversations().find(x=>x.id===currentProjectId); return { name: c?.name||'汎用チャット', emoji:'💬', prompt:'', id:currentProjectId }; })()
    : projects.find(x => x.id === currentProjectId);
  if (!p) { renderNoProject(); return; }

  document.getElementById('mainArea').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="topbar-badge">${p.emoji||'💬'}</div>
        <div class="current-name">${escapeHtml(p.name)}</div>
      </div>
      <div class="topbar-actions">
        ${!isGeneral ? `<button class="topbar-btn primary" onclick="openEditModal('${p.id}')">⚙ <span>Prompt</span></button>` : ''}
        <button class="topbar-btn danger" onclick="clearChat()">🗑 <span>クリア</span></button>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-inner">
        <div class="model-selector">
          ${MODELS.map(m => `<button class="model-btn ${currentModel===m.id?'active':''}" data-model="${m.id}" onclick="selectModel('${m.id}')">${m.label}</button>`).join('')}
        </div>
        <div class="input-wrap">
          <button class="pdf-btn" id="pdfBtn" onclick="triggerPdfUpload()" title="PDFをアップロード">📎</button>
          <button class="pdf-btn" id="imgBtn" onclick="triggerImageUpload()" title="画像をアップロード">🖼️</button>
          <textarea class="chat-input" id="chatInput"
            placeholder="メッセージを入力..."
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" onpaste="handlePaste(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">Enter で送信 · Shift+Enter で改行 · 📎 PDF · 🖼️ 画像</div>
      </div>
    </div>`;
  renderMessages();
  document.getElementById('chatInput')?.focus();
}

// 確認メモを本文から分離する
function splitMemo(text) {
  for (const marker of MEMO_MARKERS) {
    const idx = text.indexOf(marker);
    if (idx !== -1) {
      return {
        main: text.slice(0, idx).trim(),
        memo: text.slice(idx).trim()
      };
    }
  }
  return { main: text, memo: null };
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') return marked.parse(text);
  return escapeHtml(text).replace(/\n/g, '<br>');
}

// Outlook対応コピー（確実に動く方法）
function copyAsRichText(text) {
  // まずプレーンテキストでコピー（確実に動く）
  const plainCopy = () => navigator.clipboard.writeText(text);

  // ClipboardItem対応チェック
  if (!window.ClipboardItem) return plainCopy();

  try {
    const html = typeof marked !== 'undefined'
      ? marked.parse(text)
      : text.replace(/\n/g, '<br>');

    // Blobを先に作成してからClipboardItemに渡す
    const htmlBlob = new Blob([html], { type: 'text/html' });
    const textBlob = new Blob([text], { type: 'text/plain' });

    return navigator.clipboard.write([
      new ClipboardItem({
        'text/html': htmlBlob,
        'text/plain': textBlob
      })
    ]).catch(() => plainCopy());
  } catch(e) {
    return plainCopy();
  }
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!chatArea) return;
  const msgs = getMessages();
  if (!msgs.length) {
    const isGeneral = isGeneralChat(currentProjectId);
    const p = isGeneral ? (() => { const c = getGeneralConversations().find(x=>x.id===currentProjectId); return { emoji:'💬', name:c?.name||'汎用チャット', description:'何でも聞いてください' }; })() : projects.find(x => x.id === currentProjectId);
    chatArea.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${p?.emoji||'💬'}</div>
      <div class="empty-title">${escapeHtml(p?.name||'')}</div>
      <div class="empty-desc">${escapeHtml(p?.description||'メッセージを入力して会話を始めましょう')}</div>
    </div>`;
    return;
  }

  chatArea.innerHTML = msgs.map((m, i) => {
    if (m.role === 'ai') {
      const { main, memo } = splitMemo(m.content);
      const memoHtml = memo ? `
        <div class="memo-box">
          <div class="memo-label">📋 確認メモ</div>
          ${escapeHtml(memo.replace(/^【確認メモ】\n?|^\[確認メモ\]\n?/, '')).replace(/\n/g, '<br>')}
        </div>` : '';
      return `
        <div class="message ai">
          <div class="avatar">✦</div>
          <div class="bubble-wrap">
            <div class="bubble">${renderMarkdown(main)}</div>
            ${memoHtml}
            <div class="bubble-actions">
              <button class="bubble-action-btn" id="copybtn-${i}" onclick="copyMsg(${i})">📋 コピー</button>
              <button class="bubble-action-btn" onclick="regenMsg(${i})">↺ 再生成</button>
            </div>
          </div>
        </div>`;
    } else {
      return `
        <div class="message user">
          <div class="avatar">Z</div>
          <div class="bubble-wrap">
            <div class="bubble">${escapeHtml(m.content)}</div>
            <div class="bubble-actions">
              <button class="bubble-action-btn" id="copybtn-${i}" onclick="copyMsg(${i})">📋 コピー</button>
            </div>
          </div>
        </div>`;
    }
  }).join('');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearChat() {
  if (!confirm('会話履歴をクリアしますか？')) return;
  localStorage.removeItem(`chat_${currentProjectId}`);
  renderMessages();
}

function copyMsg(i) {
  const msg = getMessages()[i];
  if (!msg) return;
  // コピーはメール本文のみ（確認メモは除く）
  const { main } = splitMemo(msg.content);
  copyAsRichText(main).then(() => {
    const btn = document.getElementById(`copybtn-${i}`);
    if (!btn) return;
    btn.textContent = '✓ コピー済み';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

async function regenMsg(i) {
  const msgs = getMessages().slice(0, i);
  saveMessages(msgs); renderMessages();
  await callAPI(msgs);
}

// Enter→送信、Shift+Enter→改行
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    const isMobile = window.innerWidth <= 640;
    if (isMobile) return;
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if ((!text && !pendingPdf && !pendingImage) || isLoading) return;

  if (pendingPdf && pendingPdf.loading) {
    alert('PDFを読み込み中です。少し待ってから送信してください。');
    return;
  }
  if (pendingImage && pendingImage.loading) {
    alert('画像を読み込み中です。少し待ってから送信してください。');
    return;
  }

  const msgs = getMessages();
  const parts = [];
  if (pendingPdf) parts.push(`[PDF: ${pendingPdf.name}]`);
  if (pendingImage) parts.push(`[🖼 画像: ${pendingImage.name}]`);
  if (text) parts.push(text);
  const displayText = parts.join('\n');

  msgs.push({ role:'user', content: displayText });
  saveMessages(msgs);
  input.value = ''; input.style.height = 'auto';

  const pdfToSend = pendingPdf;
  const imageToSend = pendingImage;
  removePdf();
  removeImage();
  renderMessages();
  await callAPI(msgs, pdfToSend, imageToSend);
}

async function callAPI(msgs, pdfData = null, imageData = null) {
  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = true;

  const chatArea = document.getElementById('chatArea');

  // thinking表示
  if (chatArea) {
    const t = document.createElement('div');
    t.className = 'message ai'; t.id = 'thinkingMsg';
    t.innerHTML = `<div class="avatar">✦</div><div class="bubble-wrap"><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div></div>`;
    chatArea.appendChild(t);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  try {
    const isGeneral = isGeneralChat(currentProjectId);
    const p = isGeneral ? null : projects.find(x => x.id === currentProjectId);

    const apiMessages = msgs.map((m, idx) => {
      const role = m.role === 'ai' ? 'assistant' : 'user';
      if (idx === msgs.length - 1 && m.role === 'user') {
        let content = m.content;
        if (pdfData)   content = content.replace(`[PDF: ${pdfData.name}]\n`, '');
        if (imageData) content = content.replace(`[🖼 画像: ${imageData.name}]\n`, '');
        content = content.trim();
        if (pdfData) {
          content = `以下は「${pdfData.name}」から抽出したテキストです：\n\n${pdfData.text}\n\n---\n${content || 'このPDFの内容を把握してください。'}`;
        }
        if (!content) content = '画像を確認してください。';
        return { role, content };
      }
      return { role, content: m.content };
    });

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
          systemPrompt: p?.prompt || '',
          messages: apiMessages,
          model: currentModel,
          imageData: imageData ? { base64: imageData.base64, mimeType: imageData.mimeType, name: imageData.name } : null
        })
    });

    if (!res.ok) {
      throw new Error(`HTTPエラー: ${res.status}`);
    }

    // thinkingを削除してストリーミングバブルを作成
    document.getElementById('thinkingMsg')?.remove();

    const streamDiv = document.createElement('div');
    streamDiv.className = 'message ai';
    streamDiv.id = 'streamingMsg';
    streamDiv.innerHTML = `<div class="avatar">✦</div><div class="bubble-wrap"><div class="bubble" id="streamingBubble"> </div></div>`;
    chatArea.appendChild(streamDiv);
    chatArea.scrollTop = chatArea.scrollHeight;

    // プレーンテキストストリームを読み取る
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      fullContent += chunk;

      // リアルタイムでバブルを更新
      const bubble = document.getElementById('streamingBubble');
      if (bubble) {
        const { main } = splitMemo(fullContent);
        bubble.innerHTML = renderMarkdown(main);
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    // 完了 → 保存
    document.getElementById('streamingMsg')?.remove();
    const allMsgs = getMessages();
    allMsgs.push({ role: 'ai', content: fullContent });
    saveMessages(allMsgs);

  } catch(e) {
    document.getElementById('thinkingMsg')?.remove();
    document.getElementById('streamingMsg')?.remove();
    const allMsgs = getMessages();
    allMsgs.push({ role: 'ai', content: '⚠ エラー: ' + e.message });
    saveMessages(allMsgs);
  } finally {
    isLoading = false;
    if (sendBtn) sendBtn.disabled = false;
    renderMessages();
    document.getElementById('chatInput')?.focus();
  }
}

init();
</script>
