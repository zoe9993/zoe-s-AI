<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe's AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- marked.js for Markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --bg: #1e2027;
  --surface: #252830;
  --surface2: #2d3039;
  --surface3: #333744;
  --border: #383d4a;
  --border2: #444a58;
  --accent: #5b8af0;
  --accent-light: rgba(91,138,240,0.12);
  --text: #e4e6ef;
  --text2: #9096a8;
  --text3: #565d70;
  --user-bubble: #2e4080;
  --ai-bubble: #2d3039;
  --success: #4caf7d;
  --danger: #e05c5c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 248px;
  min-width: 248px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  z-index: 100;
  transition: transform 0.25s ease;
}

.sidebar-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.app-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }

.new-btn {
  width: 100%;
  padding: 7px 10px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid rgba(91,138,240,0.25);
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
}

.new-btn:hover { background: rgba(91,138,240,0.2); }

.projects-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  -webkit-overflow-scrolling: touch;
}

.projects-list::-webkit-scrollbar { width: 3px; }
.projects-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 8px 3px;
}

.project-item {
  padding: 7px 9px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 1px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.project-item:hover { background: var(--surface2); }
.project-item.active { background: var(--surface3); }

.project-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
.project-emoji { font-size: 15px; flex-shrink: 0; }
.project-text { min-width: 0; }

.project-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-item.active .project-name { color: var(--accent); }

.project-desc {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.project-actions { display: flex; gap: 2px; flex-shrink: 0; }

.icon-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 3px 4px;
  border-radius: 4px;
  font-size: 11px;
  transition: all 0.12s;
}

.icon-btn:hover { background: var(--border); color: var(--text2); }
.icon-btn.danger:hover { color: var(--danger); }

.sidebar-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

/* ── OVERLAY ── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
.sidebar-overlay.open { display: block; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  min-width: 0;
}

/* ── TOPBAR ── */
.topbar {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
  gap: 10px;
}

.topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

.menu-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  display: none;
}

.menu-btn:hover { background: var(--surface2); }

.current-emoji { font-size: 17px; flex-shrink: 0; }

.current-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-actions { display: flex; gap: 5px; flex-shrink: 0; }

.topbar-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}

.topbar-btn:hover { color: var(--text); background: var(--surface2); }
.topbar-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.topbar-btn.primary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── CHAT ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
  padding: 40px 20px;
}

.empty-icon { font-size: 32px; opacity: 0.4; }
.empty-title { font-size: 14px; font-weight: 600; color: var(--text2); }
.empty-desc { font-size: 12px; line-height: 1.6; color: var(--text3); max-width: 240px; }

.message {
  display: flex;
  gap: 8px;
  animation: msgIn 0.2s ease;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}

.message.user .avatar { background: var(--accent); color: white; }
.message.ai .avatar { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); font-size: 12px; }

.bubble-wrap { display: flex; flex-direction: column; max-width: 75%; }
.message.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 9px 13px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.75;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bubble);
  color: #d4e0ff;
  border: 1px solid rgba(91,138,240,0.2);
  border-radius: 10px 3px 10px 10px;
  white-space: pre-wrap;
}

.message.ai .bubble {
  background: var(--ai-bubble);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px 10px 10px 10px;
}

/* Markdown styles inside AI bubble */
.message.ai .bubble h1,
.message.ai .bubble h2,
.message.ai .bubble h3 {
  font-size: 14px;
  font-weight: 700;
  margin: 10px 0 4px;
  color: var(--text);
}
.message.ai .bubble p { margin: 4px 0; }
.message.ai .bubble ul,
.message.ai .bubble ol {
  padding-left: 18px;
  margin: 4px 0;
}
.message.ai .bubble li { margin: 2px 0; }
.message.ai .bubble strong { color: #c8d8ff; font-weight: 700; }
.message.ai .bubble em { opacity: 0.85; }
.message.ai .bubble code {
  background: var(--surface3);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
.message.ai .bubble pre {
  background: var(--surface3);
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 6px 0;
}
.message.ai .bubble pre code { background: none; padding: 0; }
.message.ai .bubble hr {
  border: none;
  border-top: 1px solid var(--border2);
  margin: 8px 0;
}
.message.ai .bubble table {
  border-collapse: collapse;
  width: 100%;
  margin: 6px 0;
  font-size: 12px;
}
.message.ai .bubble th,
.message.ai .bubble td {
  border: 1px solid var(--border2);
  padding: 5px 8px;
  text-align: left;
}
.message.ai .bubble th { background: var(--surface3); font-weight: 600; }
.message.ai .bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 10px;
  color: var(--text2);
  margin: 4px 0;
}

/* コピーボタン：常時表示 */
.bubble-actions {
  display: flex;
  gap: 4px;
  margin-top: 5px;
  padding: 0 2px;
}

.bubble-action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 10px;
  cursor: pointer;
  padding: 3px 9px;
  border-radius: 4px;
  transition: all 0.12s;
  font-family: 'DM Mono', monospace;
}

.bubble-action-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--surface3); }
.bubble-action-btn.copied { border-color: var(--success); color: var(--success); background: rgba(76,175,125,0.08); }

.thinking { display: flex; gap: 4px; align-items: center; }
.thinking span {
  width: 5px; height: 5px;
  background: var(--text3);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.3; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ── INPUT ── */
.input-area {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-inner { max-width: 720px; margin: 0 auto; }

/* PDF preview */
.pdf-preview {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 10px;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text2);
}

.pdf-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pdf-remove-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0;
}
.pdf-remove-btn:hover { color: var(--danger); }

.input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 10px;
  transition: border-color 0.15s;
}

.input-wrap:focus-within { border-color: var(--accent); }

.pdf-btn {
  background: none; border: none; color: var(--text3);
  font-size: 16px; cursor: pointer; padding: 2px 3px;
  border-radius: 4px; transition: all 0.12s; flex-shrink: 0; line-height: 1;
}
.pdf-btn:hover { color: var(--accent); background: var(--accent-light); }
.pdf-btn.active { color: var(--accent); }

.chat-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 20px;
}

.chat-input::placeholder { color: var(--text3); }

.send-btn {
  background: var(--accent);
  border: none; color: white;
  width: 28px; height: 28px;
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; font-size: 12px;
}
.send-btn:hover { background: #4a79e0; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.input-hint { text-align: center; font-size: 10px; color: var(--text3); margin-top: 5px; font-family: 'DM Mono', monospace; }

#pdfFileInput { display: none; }

/* ── NO PROJECT ── */
.no-project {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 40px 20px; text-align: center;
}
.no-project-icon { font-size: 40px; opacity: 0.3; }
.no-project h2 { font-size: 16px; font-weight: 600; color: var(--text); }
.no-project p { font-size: 12px; line-height: 1.7; color: var(--text2); max-width: 260px; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; flex-direction: column; gap: 12px;
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(3px); padding: 16px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 20px; width: 100%; max-width: 440px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.form-input, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  padding: 7px 10px; border-radius: 6px; outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn { padding: 7px 14px; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #4a79e0; }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.emoji-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
.emoji-opt {
  width: 28px; height: 28px; border-radius: 5px;
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.emoji-opt:hover { border-color: var(--accent); background: var(--accent-light); }
.emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .sidebar {
    position: fixed; top: 0; left: 0;
    height: 100vh; height: 100dvh;
    transform: translateX(-100%);
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: flex !important; }
  .bubble-wrap { max-width: 88%; }
  .input-hint { display: none; }
  .topbar-btn span { display: none; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="app-title">
      <div class="app-dot"></div>
      Zoe's AI Assistant
    </div>
    <button class="new-btn" onclick="openNewProjectModal()">＋ 新しいプロジェクト</button>
  </div>
  <div class="projects-list" id="projectsList"></div>
  <div class="sidebar-footer">
    <div class="status-dot"></div>
    Claude Sonnet 4.6
  </div>
</div>

<div class="main" id="mainArea">
  <div class="no-project">
    <div class="no-project-icon">✦</div>
    <h2>Zoe's AI Assistant</h2>
    <p>左のサイドバーからプロジェクトを選んでください。</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">新しいプロジェクト</div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-row" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">プロジェクト名 *</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：メール作成、履歴書改善..." maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">説明（任意）</label>
      <input type="text" class="form-input" id="projectDesc" placeholder="例：候補者・企業へのメール作成" maxlength="50">
    </div>
    <div class="form-group">
      <label class="form-label">システムPrompt *</label>
      <textarea class="form-textarea" id="projectPrompt" placeholder="AIへの指示を書いてください。"></textarea>
      <div class="form-hint">具体的に書くほど精度が上がります。</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveProject()">作成</button>
    </div>
  </div>
</div>

<input type="file" id="pdfFileInput" accept=".pdf" onchange="handlePdfSelect(event)">

<script>
// marked.js 設定
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

const GENERAL_ID = '__general__';
const EMOJIS = ['💬','📧','📄','📋','🔍','✍️','📊','🤝','💼','🎯','⚡','🌐','📝','🗂️','💡','🧠','🗣️','📨'];

let projects = [];
let currentProjectId = null;
let editingProjectId = null;
let selectedEmoji = '💬';
let isLoading = false;
let pendingPdf = null;

async function init() {
  await loadProjects();
  document.getElementById('loadingOverlay').style.display = 'none';
  renderSidebar();
}

async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    if (res.ok) projects = await res.json();
  } catch(e) { projects = []; }
}

async function createProject(data) {
  const res = await fetch('/api/projects', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.ok ? await res.json() : null;
}

async function updateProject(id, data) {
  await fetch(`/api/projects?id=${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

async function deleteProjectAPI(id) {
  await fetch(`/api/projects?id=${id}`, { method: 'DELETE' });
}

function renderSidebar() {
  const list = document.getElementById('projectsList');
  let html = `<div class="section-label">チャット</div>
    <div class="project-item ${currentProjectId===GENERAL_ID?'active':''}" onclick="selectProject('${GENERAL_ID}')">
      <div class="project-info">
        <div class="project-emoji">💬</div>
        <div class="project-text">
          <div class="project-name">汎用チャット</div>
          <div class="project-desc">何でも聞いてください</div>
        </div>
      </div>
    </div>`;

  if (projects.length > 0) {
    html += `<div class="section-label" style="margin-top:6px">プロジェクト</div>`;
    html += projects.map(p => `
      <div class="project-item ${currentProjectId===p.id?'active':''}" onclick="selectProject('${p.id}')">
        <div class="project-info">
          <div class="project-emoji">${p.emoji||'💬'}</div>
          <div class="project-text">
            <div class="project-name">${escapeHtml(p.name)}</div>
            ${p.description?`<div class="project-desc">${escapeHtml(p.description)}</div>`:''}
          </div>
        </div>
        <div class="project-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${p.id}')">✏️</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();confirmDelete('${p.id}')">🗑</button>
        </div>
      </div>`).join('');
  }
  list.innerHTML = html;
}

function selectProject(id) {
  currentProjectId = id; pendingPdf = null;
  renderSidebar(); renderChatArea(); closeSidebar();
}

async function confirmDelete(id) {
  if (!confirm('このプロジェクトを削除しますか？')) return;
  await deleteProjectAPI(id);
  projects = projects.filter(p => p.id !== id);
  localStorage.removeItem(`chat_${id}`);
  if (currentProjectId === id) { currentProjectId = null; renderNoProject(); }
  renderSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function initEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent === e));
}

function openNewProjectModal() {
  editingProjectId = null; selectedEmoji = '💬';
  document.getElementById('modalTitle').textContent = '新しいプロジェクト';
  document.getElementById('modalSaveBtn').textContent = '作成';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectPrompt').value = '';
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 100);
}

function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editingProjectId = id; selectedEmoji = p.emoji || '💬';
  document.getElementById('modalTitle').textContent = 'プロジェクトを編集';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('projectName').value = p.name;
  document.getElementById('projectDesc').value = p.description || '';
  document.getElementById('projectPrompt').value = p.prompt;
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) hideModal(); }

async function saveProject() {
  const name = document.getElementById('projectName').value.trim();
  const description = document.getElementById('projectDesc').value.trim();
  const prompt = document.getElementById('projectPrompt').value.trim();
  if (!name) { alert('プロジェクト名を入力してください'); return; }
  if (!prompt) { alert('Promptを入力してください'); return; }

  const saveBtn = document.getElementById('modalSaveBtn');
  saveBtn.textContent = '保存中...'; saveBtn.disabled = true;

  try {
    if (editingProjectId) {
      await updateProject(editingProjectId, { name, description, prompt, emoji: selectedEmoji });
      const idx = projects.findIndex(p => p.id === editingProjectId);
      if (idx !== -1) projects[idx] = { ...projects[idx], name, description, prompt, emoji: selectedEmoji };
    } else {
      const newP = await createProject({ name, description, prompt, emoji: selectedEmoji });
      if (newP) { projects.push(newP); currentProjectId = newP.id; }
    }
    renderSidebar(); renderChatArea(); hideModal();
  } finally {
    saveBtn.textContent = editingProjectId ? '保存' : '作成';
    saveBtn.disabled = false;
  }
}

// ── PDF ──────────────────────────────────────────────────────────────
function triggerPdfUpload() { document.getElementById('pdfFileInput').click(); }

function handlePdfSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('PDFは10MB以下にしてください'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingPdf = { name: file.name, base64: e.target.result.split(',')[1] };
    renderPdfPreview();
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function renderPdfPreview() {
  const existing = document.getElementById('pdfPreviewBar');
  if (existing) existing.remove();
  if (!pendingPdf) return;
  const inputInner = document.querySelector('.input-inner');
  const preview = document.createElement('div');
  preview.className = 'pdf-preview'; preview.id = 'pdfPreviewBar';
  preview.innerHTML = `<span>📄</span><span class="pdf-preview-name">${escapeHtml(pendingPdf.name)}</span><button class="pdf-remove-btn" onclick="removePdf()">✕</button>`;
  inputInner.insertBefore(preview, inputInner.firstChild);
  const pdfBtn = document.getElementById('pdfBtn');
  if (pdfBtn) pdfBtn.classList.add('active');
}

function removePdf() {
  pendingPdf = null;
  const bar = document.getElementById('pdfPreviewBar');
  if (bar) bar.remove();
  const pdfBtn = document.getElementById('pdfBtn');
  if (pdfBtn) pdfBtn.classList.remove('active');
}

// ── Chat ──────────────────────────────────────────────────────────────
function getMessages() { return JSON.parse(localStorage.getItem(`chat_${currentProjectId}`) || '[]'); }
function saveMessages(msgs) { localStorage.setItem(`chat_${currentProjectId}`, JSON.stringify(msgs)); }

function renderNoProject() {
  document.getElementById('mainArea').innerHTML = `
    <div class="no-project">
      <div class="no-project-icon">✦</div>
      <h2>Zoe's AI Assistant</h2>
      <p>左のサイドバーからプロジェクトを選んでください。</p>
    </div>`;
}

function renderChatArea() {
  if (!currentProjectId) { renderNoProject(); return; }
  const isGeneral = currentProjectId === GENERAL_ID;
  const p = isGeneral
    ? { name:'汎用チャット', emoji:'💬', prompt:'', id:GENERAL_ID }
    : projects.find(x => x.id === currentProjectId);
  if (!p) { renderNoProject(); return; }

  document.getElementById('mainArea').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="current-emoji">${p.emoji||'💬'}</div>
        <div class="current-name">${escapeHtml(p.name)}</div>
      </div>
      <div class="topbar-actions">
        ${!isGeneral ? `<button class="topbar-btn primary" onclick="openEditModal('${p.id}')">⚙ <span>Prompt</span></button>` : ''}
        <button class="topbar-btn danger" onclick="clearChat()">🗑 <span>クリア</span></button>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrap">
          <button class="pdf-btn" id="pdfBtn" onclick="triggerPdfUpload()" title="PDFをアップロード">📎</button>
          <textarea class="chat-input" id="chatInput"
            placeholder="メッセージを入力..."
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">Enter で送信 · Shift+Enter で改行 · 📎 でPDF添付</div>
      </div>
    </div>`;

  renderMessages();
  document.getElementById('chatInput')?.focus();
}

// Markdown → HTML変換
function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  return escapeHtml(text).replace(/\n/g, '<br>');
}

// Outlook対応コピー（HTMLとプレーンテキスト両方）
function copyAsRichText(text) {
  try {
    // HTMLに変換してクリップボードに入れる
    const html = typeof marked !== 'undefined'
      ? marked.parse(text)
      : text.replace(/\n/g, '<br>');

    const blob = new Blob([html], { type: 'text/html' });
    const plainBlob = new Blob([text], { type: 'text/plain' });
    const item = new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob });
    return navigator.clipboard.write([item]);
  } catch(e) {
    // フォールバック：プレーンテキストでコピー
    return navigator.clipboard.writeText(text);
  }
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!chatArea) return;
  const msgs = getMessages();
  if (!msgs.length) {
    const isGeneral = currentProjectId === GENERAL_ID;
    const p = isGeneral ? { emoji:'💬', name:'汎用チャット', description:'何でも聞いてください' } : projects.find(x => x.id === currentProjectId);
    chatArea.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${p?.emoji||'💬'}</div>
      <div class="empty-title">${escapeHtml(p?.name||'')}</div>
      <div class="empty-desc">${escapeHtml(p?.description||'メッセージを入力して会話を始めましょう')}</div>
    </div>`;
    return;
  }
  chatArea.innerHTML = msgs.map((m, i) => `
    <div class="message ${m.role}">
      <div class="avatar">${m.role==='user'?'Z':'✦'}</div>
      <div class="bubble-wrap">
        <div class="bubble">${m.role==='ai' ? renderMarkdown(m.content) : escapeHtml(m.content)}</div>
        <div class="bubble-actions">
          <button class="bubble-action-btn" id="copybtn-${i}" onclick="copyMsg(${i})">📋 コピー</button>
          ${m.role==='ai'?`<button class="bubble-action-btn" onclick="regenMsg(${i})">↺ 再生成</button>`:''}
        </div>
      </div>
    </div>`).join('');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearChat() {
  if (!confirm('会話履歴をクリアしますか？')) return;
  localStorage.removeItem(`chat_${currentProjectId}`);
  renderMessages();
}

function copyMsg(i) {
  const text = getMessages()[i]?.content || '';
  copyAsRichText(text).then(() => {
    const btn = document.getElementById(`copybtn-${i}`);
    if (!btn) return;
    btn.textContent = '✓ コピー済み';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

async function regenMsg(i) {
  const msgs = getMessages().slice(0, i);
  saveMessages(msgs); renderMessages();
  await callAPI(msgs);
}

// Enter→送信、Shift+Enter→改行
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if ((!text && !pendingPdf) || isLoading) return;

  const msgs = getMessages();
  const displayText = pendingPdf ? `[PDF: ${pendingPdf.name}]\n${text}` : text;
  msgs.push({ role:'user', content: displayText });
  saveMessages(msgs);
  input.value = ''; input.style.height = 'auto';

  const pdfToSend = pendingPdf;
  removePdf();
  renderMessages();
  await callAPI(msgs, pdfToSend);
}

async function callAPI(msgs, pdfData = null) {
  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = true;

  const chatArea = document.getElementById('chatArea');
  if (chatArea) {
    const t = document.createElement('div');
    t.className = 'message ai'; t.id = 'thinkingMsg';
    t.innerHTML = `<div class="avatar">✦</div><div class="bubble-wrap"><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div></div>`;
    chatArea.appendChild(t);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  try {
    const isGeneral = currentProjectId === GENERAL_ID;
    const p = isGeneral ? null : projects.find(x => x.id === currentProjectId);

    const apiMessages = msgs.map((m, idx) => {
      const role = m.role === 'ai' ? 'assistant' : 'user';
      if (pdfData && idx === msgs.length - 1 && m.role === 'user') {
        const textContent = m.content.replace(`[PDF: ${pdfData.name}]\n`, '').trim();
        return {
          role,
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfData.base64 } },
            { type: 'text', text: textContent || 'このPDFを読んで内容を把握してください。' }
          ]
        };
      }
      return { role, content: m.content };
    });

    const res = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ systemPrompt: p?.prompt || '', messages: apiMessages })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'エラーが発生しました');
    const allMsgs = getMessages();
    allMsgs.push({ role:'ai', content: data.content });
    saveMessages(allMsgs);
  } catch(e) {
    const allMsgs = getMessages();
    allMsgs.push({ role:'ai', content:'⚠ エラー: ' + e.message });
    saveMessages(allMsgs);
  } finally {
    document.getElementById('thinkingMsg')?.remove();
    isLoading = false;
    if (sendBtn) sendBtn.disabled = false;
    renderMessages();
    document.getElementById('chatInput')?.focus();
  }
}

init();
</script>
